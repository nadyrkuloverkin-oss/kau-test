  const q = questions[current];
  document.getElementById('q-label').textContent = `Вопрос ${current+1} из ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('step-count').textContent = `${current+1} / ${questions.length}`;
  document.getElementById('progress').style.width = `${((current+1)/questions.length)*100}%`;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const div = document.createElement('div');
    div.className = 'opt' + (answers[current] === i ? ' selected' : '');
    div.innerHTML = `<div class="opt-icon">${o.icon}</div><div class="opt-text">${o.text}</div>`;
    div.onclick = () => select(i);
    opts.appendChild(div);
  });
  document.getElementById('btn-back').disabled = current === 0;
  document.getElementById('btn-next').disabled = answers[current] === undefined;
  document.getElementById('btn-next').textContent = current === questions.length - 1 ? 'Узнать результат' : 'Далее';
}

function select(i) {
  answers[current] = i;
  document.querySelectorAll('.opt').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  document.getElementById('btn-next').disabled = false;
}

function goNext() {
  if (answers[current] === undefined) return;
  if (current === questions.length - 1) { showResult(); return; }
  current++;
  render();
}

function goBack() {
  if (current > 0) { current--; render(); }
}

function showResult() {
  const allScores = {...scores};
  questions.forEach((q, qi) => {
    if (answers[qi] !== undefined) {
      const s = q.opts[answers[qi]].scores;
      Object.keys(s).forEach(k => { allScores[k] = (allScores[k]||0) + s[k]; });
    }
  });
  const top = Object.keys(allScores).sort((a,b) => allScores[b]-allScores[a])[0];
  const p = profiles[top] || profiles.biz;
  document.getElementById('res-emoji').textContent = p.emoji;
  document.getElementById('res-type').textContent = p.type;
  document.getElementById('res-desc').textContent = p.desc;
  document.getElementById('res-spec').textContent = p.spec;
  document.getElementById('res-spec-sub').textContent = p.specSub;
  document.getElementById('res-cta').textContent = p.cta;
  const careersEl = document.getElementById('res-careers');
  careersEl.innerHTML = '';
  p.careers.forEach(c => {
    careersEl.innerHTML += `<div class="career-card"><div class="career-icon">${c.icon}</div><div class="career-name">${c.name}</div></div>`;
  });
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';
}

render();
</script>
